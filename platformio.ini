; ============================================================
;  ESP32 CPU Fan Controller
;  PlatformIO Configuration
; ============================================================

[platformio]
[env:esp32s3]
board         = esp32-s3-devkitc-1
framework     = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32.git#3.1.1
; Use high performance libraries to improve the performance, and avoid esp32s3 RGB LCD screen drifting issue
    platformio/framework-arduinoespressif32-libs@https://dl.espressif.com/AE/esp-arduino-libs/esp32-3.1.1-h.zip
; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
monitor_dtr = 1
monitor_rts = 1


; Filesystem (LittleFS for web files)
board_build.filesystem = littlefs

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1


; Flash Configuration for ESP32-S3-N8 (8MB Flash, No PSRAM)
board_upload.flash_size = 8MB
board_build.flash_mode = dio

; Libraries
lib_deps =
    ; AsyncTCP + ESPAsyncWebServer – maintained forks, compatible with ESP32 core 3.x
    mathieucarbou/AsyncTCP        @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    ; JSON
    bblanchon/ArduinoJson @ ^7.4.3
    ; RGB LED
    adafruit/Adafruit NeoPixel @ ^1.15.5

; Extra scripts for SPIFFS upload
extra_scripts = pre:scripts/build_flags.py, pre:scripts/build_web.py

; ----------------------------------------------------------------
; Environment variants (uncomment to use a different board)
; ----------------------------------------------------------------
; [env:esp32-s3]
; platform  = espressif32
; board     = esp32-s3-devkitc-1
; framework = arduino
