; ============================================================
;  ESP32 CPU Fan Controller
;  PlatformIO Configuration
; ============================================================

; Set build and cache directories to E: drive to avoid filling up C: drive
[platformio]
[env:esp32s3]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time


; Filesystem (LittleFS for web files)
board_build.filesystem = littlefs

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1


; PSRAM and Flash Configuration for ESP32-S3 (with 32MB OPI Flash + 8MB OPI PSRAM)
board_upload.flash_size = 32MB
board_build.arduino.memory_type = opi_opi
board_build.flash_mode = opi
board_build.psram_type = opi

; Libraries
lib_deps =
    ; AsyncTCP + ESPAsyncWebServer – maintained forks, compatible with ESP32 core 3.x
    mathieucarbou/AsyncTCP        @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0
    ; RGB LED
    adafruit/Adafruit NeoPixel @ ^1.12.0

; Extra scripts for SPIFFS upload
extra_scripts = pre:scripts/build_flags.py, pre:scripts/build_web.py

; ----------------------------------------------------------------
; Environment variants (uncomment to use a different board)
; ----------------------------------------------------------------
; [env:esp32-s3]
; platform  = espressif32
; board     = esp32-s3-devkitc-1
; framework = arduino
